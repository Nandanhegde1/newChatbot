<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
        
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151a21;
            --bg-tertiary: #1f2630;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --border: #2d3748;
            --error: #ff6b6b;
            --user-bg: #1e3a5f;
            --assistant-bg: #1f2630;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .header-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }
        
        .icon-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            scroll-behavior: smooth;
        }
        
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        .message {
            margin-bottom: 1.5rem;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-header {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        
        .message-content {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: var(--user-bg);
            margin-left: 2rem;
        }
        
        .message.assistant .message-content {
            background: var(--assistant-bg);
            border: 1px solid var(--border);
            margin-right: 2rem;
        }
        
        .message-content pre {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.5rem 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
        
        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
        }
        
        .message-content pre code {
            background: transparent;
            padding: 0;
        }
        
        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            transition: all 0.2s;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }
        
        textarea::placeholder {
            color: var(--text-secondary);
        }
        
        .send-btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            min-width: 80px;
        }
        
        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Loading State */
        .loading {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            background: var(--assistant-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            margin-right: 2rem;
            width: fit-content;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 20, 0.9);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            animation: modalSlide 0.3s ease-out;
        }
        
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }
        
        .form-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }
        
        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .empty-state-text {
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <div class="status-dot"></div>
                Claude Chat
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="exportHistory()" title="Export Chat">
                    ↓
                </button>
                <button class="icon-btn" onclick="clearHistory()" title="Clear History">
                    🗑️
                </button>
                <button class="icon-btn" onclick="openSettings()" title="Settings">
                    ⚙️
                </button>
            </div>
        </div>
        
        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div class="empty-state-title">Start a conversation</div>
                <div class="empty-state-text">Ask me anything, and I'll do my best to help</div>
            </div>
        </div>
        
        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    placeholder="Type your message..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">Send</button>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">Settings</div>
            <div class="form-group">
                <label class="form-label">Claude API Key</label>
                <input 
                    type="password" 
                    id="apiKeyInput" 
                    placeholder="sk-ant-..."
                />
                <div class="form-hint">
                    Your API key is stored locally in your browser and never sent anywhere except to Anthropic's API.
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()">Save</button>
            </div>
            <div id="settingsError"></div>
        </div>
    </div>
    
    <script>
        // State management
        let chatHistory = [];
        let apiKey = '';
        let isLoading = false;
        
        // Initialize app
        function init() {
            loadFromStorage();
            if (!apiKey) {
                openSettings();
            } else {
                renderChat();
            }
        }
        
        // Load data from localStorage
        function loadFromStorage() {
            const stored = localStorage.getItem('claudeChat');
            if (stored) {
                const data = JSON.parse(stored);
                chatHistory = data.history || [];
                apiKey = data.apiKey || '';
            }
        }
        
        // Save data to localStorage
        function saveToStorage() {
            localStorage.setItem('claudeChat', JSON.stringify({
                history: chatHistory,
                apiKey: apiKey
            }));
        }
        
        // Render chat messages
        function renderChat() {
            const container = document.getElementById('chatContainer');
            
            if (chatHistory.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-title">Start a conversation</div>
                        <div class="empty-state-text">Ask me anything, and I'll do my best to help</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = chatHistory.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-header">${msg.role === 'user' ? 'You' : 'Claude'}</div>
                    <div class="message-content">${formatMessage(msg.content)}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }
        
        // Format message content (basic markdown support)
        function formatMessage(content) {
            // Escape HTML
            let formatted = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Code blocks
            formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            
            // Inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        }
        
        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            if (!apiKey) {
                alert('Please set your API key in settings first.');
                openSettings();
                return;
            }
            
            // Add user message
            chatHistory.push({
                role: 'user',
                content: message
            });
            
            input.value = '';
            input.style.height = 'auto';
            renderChat();
            saveToStorage();
            
            // Show loading
            isLoading = true;
            updateLoadingState(true);
            
            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 4096,
                        messages: chatHistory.map(msg => ({
                            role: msg.role,
                            content: msg.content
                        }))
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'API request failed');
                }
                
                const data = await response.json();
                const assistantMessage = data.content[0].text;
                
                chatHistory.push({
                    role: 'assistant',
                    content: assistantMessage
                });
                
                renderChat();
                saveToStorage();
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
                // Remove the failed user message
                chatHistory.pop();
                renderChat();
                saveToStorage();
            } finally {
                isLoading = false;
                updateLoadingState(false);
            }
        }
        
        // Update loading state
        function updateLoadingState(loading) {
            const sendBtn = document.getElementById('sendBtn');
            const container = document.getElementById('chatContainer');
            
            sendBtn.disabled = loading;
            
            if (loading) {
                const loadingDiv = document.createElement('div');
                loadingDiv.id = 'loadingIndicator';
                loadingDiv.innerHTML = `
                    <div class="message assistant">
                        <div class="message-header">Claude</div>
                        <div class="loading">
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                        </div>
                    </div>
                `;
                container.appendChild(loadingDiv);
                container.scrollTop = container.scrollHeight;
            } else {
                const loadingDiv = document.getElementById('loadingIndicator');
                if (loadingDiv) loadingDiv.remove();
            }
        }
        
        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
        
        // Handle Enter key
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Settings modal
        function openSettings() {
            document.getElementById('apiKeyInput').value = apiKey;
            document.getElementById('settingsError').innerHTML = '';
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }
        
        function saveSettings() {
            const newKey = document.getElementById('apiKeyInput').value.trim();
            
            if (!newKey) {
                document.getElementById('settingsError').innerHTML = 
                    '<div class="error-message">Please enter an API key</div>';
                return;
            }
            
            if (!newKey.startsWith('sk-ant-')) {
                document.getElementById('settingsError').innerHTML = 
                    '<div class="error-message">API key should start with "sk-ant-"</div>';
                return;
            }
            
            apiKey = newKey;
            saveToStorage();
            closeSettings();
        }
        
        // Clear history
        function clearHistory() {
            if (confirm('Are you sure you want to clear all chat history? This cannot be undone.')) {
                chatHistory = [];
                saveToStorage();
                renderChat();
            }
        }
        
        // Export history
        function exportHistory() {
            if (chatHistory.length === 0) {
                alert('No chat history to export');
                return;
            }
            
            const text = chatHistory.map(msg => 
                `${msg.role.toUpperCase()}: ${msg.content}`
            ).join('\n\n---\n\n');
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `claude-chat-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
