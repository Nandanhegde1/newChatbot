<!DOCTYPE html>
<html>
<head>
    <title>Claude Fix</title>
    <style>
        body { background: #0a0e14; color: white; font-family: sans-serif; padding: 20px; }
        #log { background: #000; color: #0f0; padding: 10px; font-family: monospace; height: 100px; overflow: auto; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; background: #00d4aa; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="log">System Ready...</div>
    <div id="display"></div>
    <input type="text" id="msg" placeholder="Type here...">
    <button onclick="chat()">Send</button>

    <script>
        const log = (t) => document.getElementById('log').innerText += "\n" + t;
        const URL = 'https://newchatbot.nandanhegde1096.workers.dev';

        async function chat() {
            const text = document.getElementById('msg').value;
            log("Sending to: " + URL);
            
            try {
                const res = await fetch(URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-latest",
                        max_tokens: 1024,
                        messages: [{role: "user", content: text}]
                    })
                });
                
                log("Status: " + res.status);
                const data = await res.json();
                
                if (data.error) log("Error: " + data.error.message);
                else document.getElementById('display').innerHTML += "<p>Claude: " + data.content[0].text + "</p>";
                
            } catch (e) {
                log("Fetch Failed: " + e.message);
            }
        }
    </script>
</body>
</html>
