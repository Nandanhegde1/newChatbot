<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Opus 4.5 Max</title>
    <style>
        :root {
            --bg: #0a0e14;
            --panel: #151a21;
            --accent: #00d4aa;
            --text: #e8eaed;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; margin: 0; }
        header { padding: 1rem; background: var(--panel); border-bottom: 1px solid #2d3748; text-align: center; color: var(--accent); font-weight: bold; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px; border-radius: 10px; max-width: 80%; line-height: 1.5; }
        .user { background: #1e3a5f; align-self: flex-end; }
        .bot { background: #1f2630; border: 1px solid #2d3748; align-self: flex-start; }
        .input-area { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #2d3748; background: #1f2630; color: white; outline: none; }
        button { padding: 10px 25px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <header>CLAUDE // MAX SETTINGS</header>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') send()">
        <button id="sendBtn" onclick="send()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const WORKER_URL = 'https://newchatbot.nandanhegde1096.workers.dev';

        async function send() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if(!text || btn.disabled) return;

            input.value = '';
            btn.disabled = true;
            btn.innerText = 'Wait...';
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-latest', 
                        max_tokens: 4096,
                        messages: [{role: 'user', content: text}]
                    })
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error?.message || JSON.stringify(data));
                }

                const reply = data.content[0].text;
                chat.innerHTML += `<div class="msg bot">${reply}</div>`;
            } catch (e) {
                alert("DEBUG ERROR: " + e.message);
                chat.innerHTML += `<div class="msg bot" style="color: #ff6b6b;">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Send';
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
