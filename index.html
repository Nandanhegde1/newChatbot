<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Claude Opus 4.5 Max</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');
        
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151a21;
            --bg-tertiary: #1f2630;
            --accent: #00d4aa;
            --accent-hover: #00b894;
            --text-primary: #e8eaed;
            --text-secondary: #9ca3af;
            --border: #2d3748;
            --error: #ff6b6b;
            --user-bg: #1e3a5f;
            --assistant-bg: #1f2630;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
        .logo { font-weight: 700; color: var(--accent); font-size: 1.25rem; letter-spacing: -0.5px; }

        #chatContainer { flex: 1; overflow-y: auto; padding: 2rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .message { max-width: 85%; padding: 1rem 1.25rem; border-radius: 12px; line-height: 1.6; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--user-bg); border-bottom-right-radius: 2px; }
        .assistant { align-self: flex-start; background: var(--assistant-bg); border-bottom-left-radius: 2px; border: 1px solid var(--border); }
        
        .thinking-badge { color: var(--accent); font-size: 0.75rem; font-family: 'JetBrains Mono'; margin-bottom: 0.5rem; display: block; opacity: 0.8; }

        .input-area { padding: 1.5rem; background: var(--bg-secondary); border-top: 1px solid var(--border); }
        .input-container { max-width: 900px; margin: 0 auto; display: flex; gap: 0.75rem; background: var(--bg-tertiary); padding: 0.5rem; border-radius: 12px; border: 1px solid var(--border); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 0.75rem; font-size: 1rem; outline: none; }
        button { background: var(--accent); border: none; padding: 0.5rem 1.5rem; border-radius: 8px; color: var(--bg-primary); font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
    <header>
        <div class="logo">CLAUDE // OPUS 4.5</div>
        <button onclick="clearHistory()" style="background: transparent; color: var(--text-secondary); border: 1px solid var(--border);">Clear</button>
    </header>

    <div id="chatContainer"></div>

    <div class="input-area">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ask anything (Deep Thinking Enabled)..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const WORKER_URL = 'YOUR_WORKER_URL_HERE'; // <--- PASTE YOUR CLOUDFLARE URL HERE
        let chatHistory = JSON.parse(localStorage.getItem('opus_chat_history') || '[]');

        function init() {
            renderChat();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            chatHistory.push({ role: 'user', content: text });
            renderChat();

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        model: 'claude-opus-4-5',
                        max_tokens: 64000,
                        effort: 'high',
                        thinking: { type: 'enabled', budget_tokens: 32000 },
                        messages: chatHistory
                    })
                });

                const data = await response.json();
                
                // Opus 4.5 content handling
                const textBlock = data.content.find(b => b.type === 'text');
                const thinkingBlock = data.content.find(b => b.type === 'thinking');
                
                let content = textBlock ? textBlock.text : "No response.";
                
                chatHistory.push({ 
                    role: 'assistant', 
                    content: content,
                    thinking: thinkingBlock ? thinkingBlock.thinking : null
                });

                renderChat();
                localStorage.setItem('opus_chat_history', JSON.stringify(chatHistory));
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        function renderChat() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = chatHistory.map(msg => `
                <div class="message ${msg.role}">
                    ${msg.thinking ? `<span class="thinking-badge">THOUGHT: ${msg.thinking.substring(0, 100)}...</span>` : ''}
                    ${msg.content}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function clearHistory() {
            chatHistory = [];
            localStorage.removeItem('opus_chat_history');
            renderChat();
        }

        init();
    </script>
</body>
</html>
