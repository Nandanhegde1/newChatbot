<!DOCTYPE html>
<html>
<head>
    <title>Claude 4.5 Max</title>
    <style>
        body { background: #0a0e14; color: white; font-family: sans-serif; padding: 20px; }
        #chat { height: 300px; overflow: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        input { width: 70%; padding: 10px; background: #111; color: white; border: 1px solid #333; }
        button { padding: 10px; background: #00d4aa; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input type="text" id="in" placeholder="Ask Claude...">
    <button onclick="ask()">Send</button>

    <script>
        async function ask() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const val = input.value;
            chat.innerHTML += `<p><b>You:</b> ${val}</p>`;
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-latest",
                        max_tokens: 1024,
                        messages: [{role: "user", content: val}]
                    })
                });
                const data = await res.json();
                chat.innerHTML += `<p><b>Claude:</b> ${data.content[0].text}</p>`;
            } catch (e) {
                chat.innerHTML += `<p style="color:red">Error: ${e.message}</p>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
